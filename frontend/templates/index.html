<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Language to Speech</title>
 
</head>
<body>
  <header>
    <h1>Sign Language to Speech</h1>
    <div class="toggle" onclick="toggleTheme()">🌙</div>
  </header>
  
  <main>
    <div class="card">
      <h2>Webcam Feed</h2>
      <video id="webcam" autoplay></video>
    </div>
    
    <div class="card">
      <h2>Detected Text</h2>
      <div id="outputText">Waiting for sign input...</div>
      <button onclick="speakText()">🔊 Speak</button>
    </div>
  </main>
  
  <footer>
    <p>Accessibility Project • Modern UI</p>
  </footer>

  <script>
    // Dark/Light Mode Toggle
    function toggleTheme() {
      document.body.classList.toggle('dark');
    }

    // Webcam Access
    const webcam = document.getElementById('webcam');
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        webcam.srcObject = stream;
      })
      .catch(err => {
        console.error("Error accessing webcam: ", err);
      });

    // Placeholder: Simulated sign recognition output
    let detectedText = "Hello, welcome!";
    document.getElementById('outputText').innerText = detectedText;

    // Text-to-Speech
    function speakText() {
      const text = document.getElementById('outputText').innerText;
      const speech = new SpeechSynthesisUtterance(text);
      window.speechSynthesis.speak(speech);
    }
  </script>
</body>
</html>
